name: Challenge

on:
  push:

jobs:

  validate:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - run: ./scripts/check_notes.sh

  dockerfile:

    runs-on: ubuntu-latest

    needs: validate

    steps:

      - uses: actions/checkout@v4

      - run: docker build -t devops-test .

  dockercompose:

    runs-on: ubuntu-latest

    needs: dockerfile

    steps:

      - uses: actions/checkout@v4

      - run: docker compose config

  ansiblesyntax:

    runs-on: ubuntu-latest

    needs: dockercompose

    steps:

      - uses: actions/checkout@v4

      - run: ansible-playbook --syntax-check playbook.yml
