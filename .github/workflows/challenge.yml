name: Challenge

on:
  push:

jobs:

  validate:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - run: ./scripts/check_notes.sh

  dockerfile:

    runs-on: ubuntu-latest

    needs: validate

    steps:

      - uses: actions/checkout@v4

      - run: docker build -t devops-test .

  dockercompose:

    runs-on: ubuntu-latest

    needs: dockerfile

    steps:

      - uses: actions/checkout@v4

      - run: docker compose config

  ansiblesyntax:

    runs-on: ubuntu-latest

    needs: dockercompose

    steps:

      - uses: actions/checkout@v4

      - run: ansible-playbook --syntax-check playbook.yml

  terraform:

    runs-on: ubuntu-latest

    needs: ansiblesyntax

    steps:

      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Check for Terraform files
        id: tfcheck
        run: |
          if find . -name "*.tf" | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi


      - name: Terraform Format Check
        if: steps.tfcheck.outputs.found == 'true'
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        if: steps.tfcheck.outputs.found == 'true'
        run: |
          for dir in $(find . -name "*.tf" -exec dirname {} \; | sort -u): do
            echo "Validating $dir"
            cd "$dir"
            terraform init -backend=false
            terraform validate
            cd -
          done
